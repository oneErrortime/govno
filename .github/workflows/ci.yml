name: "💩 CI + GitHub Pages"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write   # нужно для gh-pages push

jobs:
  # ─── Говно-сервер ──────────────────────────────────────────────────────────
  server:
    name: "🦀 Server"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p govno-server --release

      - name: Clippy
        run: cargo clippy -p govno-server -- -D warnings

  # ─── WASM-клиент + деплой на GitHub Pages ──────────────────────────────────
  client-and-pages:
    name: "🕸️ WASM + GitHub Pages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable + wasm32 target + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (release)
        run: wasm-pack build client --target web --out-dir ../www/pkg --release

      - name: Clippy WASM
        run: cargo clippy -p govno-client --target wasm32-unknown-unknown -- -D warnings

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: govno-client-wasm
          path: www/pkg/

      # Деплоим www/ (index.html + pkg/*.wasm + pkg/*.js) на gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          commit_message: "💩 deploy: ${{ github.sha }}"
