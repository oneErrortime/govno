<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💩 ГОВНО-КЛИЕНТ</title>
  <style>
    :root {
      --brown-dark:  #1a0d00;
      --brown-mid:   #3b1f00;
      --brown-light: #6b3a10;
      --amber:       #c97a1a;
      --cream:       #f5deb3;
      --green:       #5ecc6a;
      --red:         #e05555;
      --yellow:      #e8c84a;
      --font-mono:   "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--brown-dark);
      color: var(--cream);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      letter-spacing: 0.05em;
      color: var(--amber);
      text-shadow: 0 0 18px #c97a1a88;
    }
    header p.subtitle {
      color: #9e7040;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      background: var(--brown-light);
      color: var(--cream);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      margin: 4px 2px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 720px;
      background: var(--brown-mid);
      border: 1px solid var(--brown-light);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px #00000060;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--brown-dark);
      border-bottom: 1px solid var(--brown-light);
      font-size: 0.82rem;
    }
    .status-bar label { color: #9e7040; }
    #status {
      font-weight: 600;
      transition: color 0.3s;
    }
    .status-ok         { color: var(--green); }
    .status-connecting { color: var(--yellow); }
    .status-error      { color: var(--red); }

    /* ── URL bar ── */
    .url-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--brown-dark);
      border-bottom: 1px solid var(--brown-light);
    }
    .url-bar input {
      flex: 1;
      background: var(--brown-mid);
      border: 1px solid var(--brown-light);
      border-radius: 6px;
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 6px 10px;
      outline: none;
    }
    .url-bar input:focus { border-color: var(--amber); }
    .btn-connect {
      padding: 6px 14px;
      background: var(--amber);
      color: var(--brown-dark);
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-connect:hover { opacity: 0.85; }

    /* ── LOG ── */
    #log {
      height: 340px;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #log p {
      font-size: 0.85rem;
      line-height: 1.4;
      padding: 4px 8px;
      border-radius: 4px;
      word-break: break-word;
    }
    .msg-system { color: #9e7040; font-style: italic; }
    .msg-server { color: var(--cream); background: #2e1800; }
    .msg-client { color: #a8d8a8; }
    .msg-error  { color: var(--red); }

    /* scrollbar */
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: var(--brown-dark); }
    #log::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 3px; }

    /* ── INPUT ── */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--brown-light);
      background: var(--brown-dark);
    }
    #msg-input {
      flex: 1;
      background: var(--brown-mid);
      border: 1px solid var(--brown-light);
      border-radius: 6px;
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--amber); }
    #msg-input::placeholder { color: #6b4820; }

    #btn-send {
      padding: 8px 18px;
      background: var(--amber);
      color: var(--brown-dark);
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #btn-send:hover:not(:disabled) { opacity: 0.85; transform: scale(1.03); }
    #btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── FOOTER ── */
    footer {
      margin-top: 20px;
      font-size: 0.72rem;
      color: #5a3818;
      text-align: center;
    }
    footer code { color: #8a5820; }
  </style>
</head>
<body>

<header>
  <h1>💩 ГОВНО-КЛИЕНТ</h1>
  <p class="subtitle">enterprise-grade WebSocket клиент</p>
  <span class="badge">Rust</span>
  <span class="badge">WASM</span>
  <span class="badge">0 строк JS</span>
  <span class="badge">WebSocket</span>
</header>

<div class="card">

  <!-- статус -->
  <div class="status-bar">
    <label>статус:</label>
    <span id="status" class="status-connecting">⏳ инициализация...</span>
  </div>

  <!-- URL бар для переподключения -->
  <div class="url-bar">
    <input id="url-input" type="text" value="ws://127.0.0.1:3000/ws" />
    <button class="btn-connect" id="btn-reconnect">🔌 подключить</button>
  </div>

  <!-- лог сообщений -->
  <div id="log">
    <p class="msg-system">— ожидаем загрузки WASM... —</p>
  </div>

  <!-- ввод -->
  <div class="input-row">
    <input
      id="msg-input"
      type="text"
      placeholder="Введи говно и нажми Enter..."
      disabled
    />
    <button id="btn-send" disabled>Отправить 💩</button>
  </div>

</div>

<footer>
  клиент написан на <code>Rust</code>, скомпилирован в
  <code>WebAssembly</code> через <code>wasm-pack</code> —
  ни одной строчки JavaScript
</footer>

<!--
  ES Module — единственный «JS» в проекте.
  Это клей-загрузчик, сгенерированный wasm-bindgen,
  наш Rust-код живёт в govno_client_bg.wasm
-->
<script type="module">
  import init, { connect, send_message, disconnect } from './pkg/govno_client.js';

  // Загружаем WASM (это автоматически вызовет #[wasm_bindgen(start)])
  await init();

  // Кнопка "Отправить"
  document.getElementById('btn-send').addEventListener('click', () => {
    const input = document.getElementById('msg-input');
    send_message(input.value);
    input.value = '';
    input.focus();
  });

  // Enter в поле ввода
  document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-send').click();
  });

  // Переподключение
  document.getElementById('btn-reconnect').addEventListener('click', () => {
    const url = document.getElementById('url-input').value.trim();
    if (url) connect(url);
  });
</script>

</body>
</html>
