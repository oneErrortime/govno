server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WASM files must have the right MIME type or browsers refuse to load them
    types {
        application/wasm  wasm;
        text/javascript   js;
        text/html         html;
    }
    include /etc/nginx/mime.types;

    # Cache WASM and JS aggressively (they're content-hashed by wasm-pack)
    location ~* \.(wasm|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin *;
    }
}
